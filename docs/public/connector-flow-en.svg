<svg width="920" height="560" viewBox="0 0 920 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">uv-im-connector data flow</title>
  <desc id="desc">IM providers connect through provider adapters into normalized events and resources, then caller applications send outbound messages back through the connector.</desc>
  <defs>
    <linearGradient id="accent" x1="88" y1="78" x2="828" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="920" height="560" rx="8" fill="#ffffff"/>
  <rect x="32" y="32" width="856" height="496" rx="8" fill="#f9f9f9" stroke="#ededed"/>
  <rect x="80" y="76" width="184" height="48" rx="8" fill="url(#accent)"/>
  <text x="104" y="106" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Protocol v1</text>
  <text x="80" y="170" fill="#181818" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">Universal IM protocol</text>
  <text x="80" y="206" fill="#5d5d5d" font-family="Inter, Arial, sans-serif" font-size="15">Inbound events · Outbound messages · Resources · Capabilities</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="266" width="166" height="84" rx="8" fill="#ffffff" stroke="#ededed"/>
    <text x="118" y="303" fill="#181818" font-size="16" font-weight="600">IM providers</text>
    <text x="110" y="328" fill="#5d5d5d" font-size="12">WeCom · Lark · Slack</text>

    <rect x="326" y="266" width="174" height="84" rx="8" fill="#ffffff" stroke="#ededed"/>
    <text x="378" y="303" fill="#181818" font-size="16" font-weight="600">Adapters</text>
    <text x="362" y="328" fill="#5d5d5d" font-size="12">auth · decode · download · send</text>

    <rect x="580" y="246" width="238" height="124" rx="8" fill="#ffffff" stroke="#ededed"/>
    <text x="628" y="292" fill="#181818" font-size="16" font-weight="600">uv-im-connector</text>
    <text x="624" y="320" fill="#5d5d5d" font-size="12">Event · ResourceRef</text>
    <text x="624" y="342" fill="#5d5d5d" font-size="12">OutboundMessage · Health</text>
  </g>

  <path d="M256 308H314" stroke="#282828" stroke-width="2" stroke-linecap="round"/>
  <path d="M304 299L316 308L304 317" stroke="#282828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M510 308H568" stroke="#282828" stroke-width="2" stroke-linecap="round"/>
  <path d="M558 299L570 308L558 317" stroke="#282828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="144" y="420" width="292" height="82" rx="8" fill="#ffffff" stroke="#ededed"/>
  <text x="182" y="454" fill="#181818" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600">Caller application</text>
  <text x="182" y="480" fill="#5d5d5d" font-family="Inter, Arial, sans-serif" font-size="12">workflow · sessions · workspace · writeback</text>

  <path d="M700 378C674 426 604 462 448 462" stroke="#282828" stroke-width="2" stroke-linecap="round"/>
  <path d="M460 453L446 462L461 471" stroke="#282828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M436 424C536 396 610 372 672 360" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 8"/>
  <path d="M660 354L674 359L664 370" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="528" y="430" fill="#282828" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">watch events</text>
  <text x="494" y="392" fill="#4f46e5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">send replies</text>
</svg>
